services:
  web:
    build: .                     # 用当前目录的 Dockerfile 构建镜像
    ports:
      - "8000:8000"               # 把容器的 8000 端口映射到你电脑的 8000 端口
    volumes:
      - .:/app                    # 把本地代码挂进容器，改代码不用重新 build
    environment:
      # LLM 的 API key 从你电脑的环境变量传进去，不写死在代码里
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # 开关：设为 1 时用假的 LLM（不花钱、不等待），方便你先跑通流程
      - USE_MOCK_LLM=${USE_MOCK_LLM:-1}
