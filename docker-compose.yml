services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - USE_MOCK_LLM=${USE_MOCK_LLM:-1}
      # 新增：告诉 Django 怎么连数据库。这几个值待会儿 settings.py 会读
      - POSTGRES_DB=careplan
      - POSTGRES_USER=careplan
      - POSTGRES_PASSWORD=careplan
      - POSTGRES_HOST=db          # 关键：主机名就是下面那个服务的名字 "db"
      - POSTGRES_PORT=5432
    depends_on:
      - db                        # 让 db 先启动，web 再启动

  # ↓↓↓ 新增的数据库服务 ↓↓↓
  db:
    image: postgres:16            # 直接用官方 Postgres 镜像，不用自己 build
    environment:
      # 容器第一次启动时，会用这三个值自动创建数据库和账号
      - POSTGRES_DB=careplan
      - POSTGRES_USER=careplan
      - POSTGRES_PASSWORD=careplan
    volumes:
      - postgres_data:/var/lib/postgresql/data   # 数据存到这，容器重启不丢
    ports:
      - "5432:5432"               # 映射出来，这样你电脑上的 TablePlus 能连进去看

# 顶层声明那个 volume（持久化数据用）
volumes:
  postgres_data: